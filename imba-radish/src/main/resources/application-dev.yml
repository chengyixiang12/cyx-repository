spring:
  servlet:
    multipart:
      location: E:\java\cyx-repository\imba-radish\tmp
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 1MB
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          username: ${DATASOURCE_USERNAME_MYSQL_MASTER}
          password: ${DATASOURCE_PASSWORD_MYSQL_MASTER}
          url: ${DATASOURCE_URL_MYSQL_MASTER}
          driver-class-name: com.mysql.cj.jdbc.Driver
        slave:
          username: ${DATASOURCE_USERNAME_POSTGRESQL_SLAVE}
          password: ${DATASOURCE_PASSWORD_POSTGRESQL_SLAVE}
          url: ${DATASOURCE_URL_POSTGRESQL_SLAVE}
          driver-class-name: org.postgresql.Driver
      hikari:
        # 连接池最大连接数
        maximum-pool-size: 10
        # 连接池最小空闲连接数
        minimum-idle: 5
        # 空闲连接的最大等待时间（单位：毫秒）
        idle-timeout: 30000
        # 获取连接的超时时间（单位：毫秒）
        connection-timeout: 20000
        # 连接的最大生命周期（单位：毫秒）
        max-lifetime: 180000
        # 连接验证的 SQL 查询
        connection-test-query: SELECT 1
        # 连接验证的超时时间（单位：毫秒）
        validation-timeout: 5000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      # 密码，未配置密码可不填
      password: ${REDIS_PASSWORD}
      # 数据源
      database: 15
      # 连接超时（单位：毫秒）
      connect-timeout: 2000
      # 响应超时（单位：毫秒）
      timeout: 5000
      # redis连接池
      lettuce:
        pool:
          # 连接池中的最大连接数
          max-active: 10
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 2
          # 连接池获取连接的最大等待时间（单位：毫秒）
          max-wait: 5000
  rabbitmq:
    host: ${RABBIT_MQ_HOST}
    port: ${RABBIT_MQ_PORT}
    username: ${RABBIT_MQ_USERNAME}
    password: ${RABBIT_MQ_PASSWORD}
    virtual-host: /
  jmx:
    # 启动JMX监控，jconsole
    enabled: true
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          threadPool:
            threadCount: 5

# 启用api文档
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
# 日志
logging:
  level:
    org.springframework.boot: info
    com.baomidou.mybatisplus: info
    org.mybatis: info
    com.soft.base.mapper: debug
    com.soft.module.mapper: info
    org.springframework.boot.actuate: info
    org.flowable.job.service.impl.asyncexecutor: info
    root: info
  config: classpath:logback-spring.xml
log:
  # 是否开启日志记录
  enable: true
  # 是否记录请求及响应数据
  record-param: false
  file:
    home: logs
# 临时文件存储路径
tmp:
  path: E:\java\cyx-repository\imba-radish\tmp
# 不鉴权url
permit:
  urls:
    - /auth/**
    - /doc.html
    - /message/sendRegistCaptcha
    - /message/sendLoginCaptcha
    - /ws/**
    - /secretKey/getPublicKey
    - /error
    - /favicon.ico
    - /user/validUserInfoForRegister
# 限流
rate-limit:
  # 是否开启限流
  enable: true
  # 最大请求数；单位：个
  max-request: 60
  # 窗口大小；单位：秒
  window-size: 1
# 大文件存储路径
storage:
  big-file:
    location: D:/bigFile
# 启用knife4j文档
knife4j:
  enable: true
# 性能监控配置
management:
  endpoints:
    web:
      exposure:
        # 暴露的监控端点
        include: health, metrics, info
  endpoint:
    health:
      # 显示详细信息
      show-details: always
# flowable
flowable:
  database-schema-update: false
  check-process-definitions: true
  idm:
    # 禁用身份认证
    enabled: false
  # 禁用事件触发
  eventregistry:
    enabled: false
  # 保留基础的历史记录
  history-level: activity
  db-history-used: false
  cmmn:
    async:
      executor:
        # 将轮询间隔从默认的 100ms 调整为 1~5 秒（根据业务需求）
        default-async-job-acquire-wait-time: 2s
        # 每次拉取的最大作业数量（减少频繁查询）
        max-timer-jobs-per-acquisition: 20